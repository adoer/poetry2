name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: REGISTRY,GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            set -e

            PROJECT_DIR="/opt/poetry2"

            if [ -d "$PROJECT_DIR" ]; then
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                echo "Directory exists but is not a git repository. Removing and re-cloning..."
                if [ -f "$PROJECT_DIR/.env" ]; then
                  cp "$PROJECT_DIR/.env" /tmp/poetry2_env_backup
                fi
                rm -rf "$PROJECT_DIR"
                git clone https://github.com/$GITHUB_REPOSITORY.git "$PROJECT_DIR"
                if [ -f /tmp/poetry2_env_backup ]; then
                  cp /tmp/poetry2_env_backup "$PROJECT_DIR/.env"
                fi
              fi
            fi
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Cloning repository..."
              git clone https://github.com/$GITHUB_REPOSITORY.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            git pull

            if [ ! -f .env ]; then
              echo "Error: .env file not found in $PROJECT_DIR"
              echo "Create one from .env.example before deploying."
              exit 1
            fi

            echo "${{ secrets.SERVER_GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            IMAGE_TAG=$GITHUB_SHA

            cat > docker-compose.prod.yml << DEOF
            services:
              backend:
                image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG}
              nginx:
                image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG}
            DEOF

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker rm -f poetry2-mariadb poetry2-backend poetry2-nginx 2>/dev/null || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
