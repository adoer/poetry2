server:
  port: 8080
  undertow:
    threads:
      io: 4
      worker: 200
    direct-buffers: true
    buffer-size: 16384

spring:
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mariadb://localhost:3306/news?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:du147852.}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 5000
      pool-name: NewsHikariCP

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
          batch_size: 50
    defer-datasource-initialization: true

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://ai.xerduo.com}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    root: WARN
    com.news: INFO
