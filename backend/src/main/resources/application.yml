server:
  port: 8080
  undertow:
    threads:
      io: 2
      worker: 10
    direct-buffers: false
    buffer-size: 1024

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/news?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:du147852.}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    root: WARN
    com.news: INFO
