server:
  port: 8080
  undertow:
    threads:
      io: 4
      worker: 200
    direct-buffers: true
    buffer-size: 16384

spring:
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&authenticationPlugins=mysql_native_password
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 5000
      pool-name: PoetryHikariCP

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
          batch_size: 50
    defer-datasource-initialization: true

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://ai.xerduo.com}

jwt:
  secret: ${JWT_SECRET:dev-placeholder-jwt-secret-do-not-use-in-prod}
  expiration: 86400000

logging:
  level:
    root: WARN
    com.news: INFO
